<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CARRFS | Backend Logs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050b18;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            height: 52px;
            background: rgba(5, 11, 24, 0.97);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            flex-shrink: 0
        }

        .logo {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem
        }

        .nav-right a {
            color: #64748b;
            font-size: .8rem;
            text-decoration: none
        }

        .nav-right a:hover {
            color: #e2e8f0
        }

        .badge {
            font-size: .7rem;
            padding: .2rem .6rem;
            border-radius: 20px;
            font-weight: 600
        }

        .badge.live {
            background: rgba(34, 197, 94, .15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, .3);
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .6
            }
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .65rem 1rem;
            background: rgba(255, 255, 255, .02);
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            flex-shrink: 0
        }

        .tb-btn {
            padding: .3rem .75rem;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .04);
            color: #94a3b8;
            font-size: .75rem;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s
        }

        .tb-btn:hover {
            background: rgba(255, 255, 255, .09);
            color: #e2e8f0
        }

        .tb-sep {
            width: 1px;
            height: 18px;
            background: rgba(255, 255, 255, .08)
        }

        .filter-label {
            font-size: .72rem;
            color: #475569
        }

        .filter-btn {
            padding: .25rem .55rem;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: .7rem;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s;
            background: transparent;
            color: #64748b
        }

        .filter-btn.on {
            border-color: var(--c);
            background: rgba(var(--cr), .12);
            color: var(--c)
        }

        #countBadge {
            font-size: .7rem;
            color: #64748b;
            margin-left: auto
        }

        .log-wrap {
            flex: 1;
            overflow-y: auto;
            padding: .6rem .8rem;
            display: flex;
            flex-direction: column;
            gap: 1px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .73rem
        }

        .log-wrap::-webkit-scrollbar {
            width: 5px
        }

        .log-wrap::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .1);
            border-radius: 3px
        }

        .log-row {
            display: flex;
            align-items: flex-start;
            gap: .6rem;
            padding: .28rem .5rem;
            border-radius: 5px;
            animation: fadeIn .15s ease
        }

        .log-row:hover {
            background: rgba(255, 255, 255, .03)
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(2px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .log-ts {
            color: #334155;
            flex-shrink: 0;
            width: 60px
        }

        .log-lvl {
            flex-shrink: 0;
            width: 58px;
            font-weight: 600;
            font-size: .65rem;
            text-align: center;
            border-radius: 4px;
            padding: .05rem .3rem
        }

        .lvl-INFO {
            background: rgba(59, 130, 246, .12);
            color: #60a5fa
        }

        .lvl-WARNING {
            background: rgba(251, 146, 60, .12);
            color: #fb923c
        }

        .lvl-ERROR {
            background: rgba(248, 113, 113, .12);
            color: #f87171
        }

        .lvl-DEBUG {
            background: rgba(100, 116, 139, .1);
            color: #64748b
        }

        .log-msg {
            flex: 1;
            white-space: pre-wrap;
            line-height: 1.5;
            color: #cbd5e1
        }

        /* special colour for emoji content */
        .log-msg.ok {
            color: #86efac
        }

        .log-msg.warn {
            color: #fb923c
        }

        .log-msg.err {
            color: #f87171
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #334155;
            gap: .5rem
        }

        .empty-state svg {
            opacity: .3
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">CARRFS — Backend Logs</div>
        <div class="nav-right">
            <span class="badge live" id="liveBadge">● LIVE</span>
            <a href="/map">🗺 Route Map</a>
            <a href="/dashboard">Dashboard</a>
        </div>
    </nav>

    <div class="toolbar">
        <button class="tb-btn" onclick="togglePause()" id="pauseBtn">⏸ Pause</button>
        <button class="tb-btn" onclick="clearLogs()">🗑 Clear view</button>
        <button class="tb-btn" onclick="window.open('/api/logs?n=200','_blank')">📄 Raw JSON</button>
        <div class="tb-sep"></div>
        <span class="filter-label">Level:</span>
        <button class="filter-btn on" id="fINFO" style="--c:#60a5fa;--cr:59,130,246"
            onclick="toggleFilter('INFO')">INFO</button>
        <button class="filter-btn on" id="fWARNING" style="--c:#fb923c;--cr:251,146,60"
            onclick="toggleFilter('WARNING')">WARN</button>
        <button class="filter-btn on" id="fERROR" style="--c:#f87171;--cr:248,113,113"
            onclick="toggleFilter('ERROR')">ERROR</button>
        <span id="countBadge">0 entries</span>
    </div>

    <div class="log-wrap" id="logWrap">
        <div class="empty-state" id="emptyState">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 12h6M9 16h6M9 8h3M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
            </svg>
            <span>Waiting for backend activity…</span>
            <span style="font-size:.65rem">Go to the Route Optimizer and analyse a route to see live logs here.</span>
        </div>
    </div>

    <script>
        let paused = false;
        let filters = { INFO: true, WARNING: true, ERROR: true };
        let shownCount = 0;
        let autoScroll = true;

        const wrap = document.getElementById('logWrap');
        const empty = document.getElementById('emptyState');

        function togglePause() {
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
            document.getElementById('liveBadge').textContent = paused ? '⏸ PAUSED' : '● LIVE';
            document.getElementById('liveBadge').className = 'badge ' + (paused ? '' : 'live');
        }

        function clearLogs() {
            wrap.innerHTML = '';
            wrap.appendChild(empty);
            shownCount = 0;
            updateCount();
        }

        function toggleFilter(lvl) {
            filters[lvl] = !filters[lvl];
            const btn = document.getElementById('f' + lvl);
            btn.classList.toggle('on', filters[lvl]);
            rebuildVisible();
        }

        function rebuildVisible() {
            // Re-apply filters to existing rows
            wrap.querySelectorAll('.log-row').forEach(row => {
                const lvl = row.dataset.lvl;
                row.style.display = filters[lvl] !== false ? '' : 'none';
            });
            updateCount();
        }

        function updateCount() {
            const visible = wrap.querySelectorAll('.log-row:not([style*="none"])').length;
            document.getElementById('countBadge').textContent = visible + ' entries';
        }

        function msgClass(msg) {
            if (msg.includes('✓') || msg.includes('===') || msg.includes('ready')) return 'ok';
            if (msg.includes('⚠') || msg.includes('UNAVAILABLE')) return 'warn';
            if (msg.includes('✗') || msg.includes('ERROR') || msg.includes('failed')) return 'err';
            return '';
        }

        let lastLogCount = 0;

        async function fetchLogs() {
            if (paused) return;
            try {
                const res = await fetch('/api/logs?n=200');
                const data = await res.json();
                const logs = data.logs || [];

                if (logs.length === 0) return;

                // Only process new entries
                if (logs.length > lastLogCount) {
                    const newEntries = logs.slice(lastLogCount);
                    lastLogCount = logs.length;

                    if (empty.parentNode === wrap) empty.remove();

                    newEntries.forEach(entry => {
                        const row = document.createElement('div');
                        row.className = 'log-row';
                        row.dataset.lvl = entry.lvl;
                        row.style.display = filters[entry.lvl] !== false ? '' : 'none';
                        row.innerHTML = `
                    <span class="log-ts">${entry.ts}</span>
                    <span class="log-lvl lvl-${entry.lvl}">${entry.lvl}</span>
                    <span class="log-msg ${msgClass(entry.msg)}">${escHtml(entry.msg)}</span>`;
                        wrap.appendChild(row);
                    });
                    updateCount();

                    // Auto-scroll if near bottom
                    if (autoScroll) {
                        wrap.scrollTop = wrap.scrollHeight;
                    }
                }
            } catch (e) {
                // server not ready yet
            }
        }

        function escHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Detect manual scroll to pause auto-scroll
        wrap.addEventListener('scroll', () => {
            const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 40;
            autoScroll = atBottom;
        });

        // Poll every 1.5 seconds
        fetchLogs();
        setInterval(fetchLogs, 1500);
    </script>
</body>

</html>
